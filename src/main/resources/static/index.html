<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat Rooms</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>

<div id="sidebar">

    <h2>💬 SALAS</h2>

    <div class="room active" onclick="joinRoom('general')">
        # general
    </div>

    <div class="room" onclick="joinRoom('gaming')">
        # gaming
    </div>

    <div class="room" onclick="joinRoom('dev')">
        # dev
    </div>

</div>

<div id="chat">

    <div id="topbar">
        Usuario:
        <span id="user"></span>

        |

        Sala:
        <span id="currentRoom">general</span>
    </div>

    <ul id="messages"></ul>

    <div id="inputBox">

        <input
                type="text"
                id="message"
                placeholder="Escribe un mensaje..."
        >

        <button onclick="sendMessage()">
            Enviar
        </button>

    </div>

</div>

<script>

    // =========================
    // VARIABLES
    // =========================

    let stompClient = null;

    let currentRoom = "general";

    let currentSubscription = null;

    // =========================
    // USER
    // =========================

    let userEmail = localStorage.getItem("userEmail");

    if (!userEmail) {

        userEmail = prompt("Introduce tu nombre");

        if (!userEmail || userEmail.trim() === "") {
            userEmail = "Invitado";
        }

        localStorage.setItem("userEmail", userEmail);
    }

    document.getElementById("user").innerText = userEmail;

    // =========================
    // CONNECT
    // =========================

    function connect() {

        const socket = new SockJS('/ws');

        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {

            joinRoom(currentRoom);

        });
    }

    // =========================
    // ACTIVE ROOM UI
    // =========================

    function updateActiveRoom(room) {

        const rooms = document.querySelectorAll(".room");

        rooms.forEach(r => r.classList.remove("active"));

        const active = [...rooms].find(r =>
            r.textContent.includes(room)
        );

        if (active) {
            active.classList.add("active");
        }
    }

    // =========================
    // LOAD HISTORY
    // =========================

    async function loadHistory(room) {

        try {

            const response = await fetch("/api/messages/" + room);

            const messages = await response.json();

            const box = document.getElementById("messages");

            box.innerHTML = "";

            messages.forEach(message => {

                showMessage(message);

            });

        } catch (error) {

            console.error("Error cargando historial:", error);

        }
    }

    // =========================
    // JOIN ROOM
    // =========================

    async function joinRoom(room) {

        currentRoom = room;

        document.getElementById("currentRoom").innerText = room;

        updateActiveRoom(room);

        // cancelar suscripción anterior
        if (currentSubscription) {
            currentSubscription.unsubscribe();
        }

        // cargar historial
        await loadHistory(room);

        // websocket de la sala
        currentSubscription = stompClient.subscribe(
            "/topic/" + room,
            function (msg) {

                const message = JSON.parse(msg.body);

                showMessage(message);
            }
        );
    }

    // =========================
    // SEND MESSAGE
    // =========================

    function sendMessage() {

        const input = document.getElementById("message");

        const content = input.value.trim();

        if (content === "") return;

        stompClient.send("/app/send", {}, JSON.stringify({

            sender: userEmail,
            content: content,
            roomId: currentRoom

        }));

        input.value = "";
    }

    // =========================
    // SHOW MESSAGE
    // =========================

    function showMessage(message) {

        const box = document.getElementById("messages");

        const li = document.createElement("li");

        li.innerHTML =
            "<strong>" + message.sender + "</strong><br>" +
            message.content;

        box.appendChild(li);

        box.scrollTop = box.scrollHeight;
    }

    // =========================
    // ENTER TO SEND
    // =========================

    document.addEventListener("DOMContentLoaded", () => {

        document.getElementById("message")
            .addEventListener("keypress", function(e) {

                if (e.key === "Enter") {
                    sendMessage();
                }

            });

    });

    // =========================
    // START
    // =========================

    connect();

</script>

</body>
</html>
