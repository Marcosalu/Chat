<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat Rooms</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>

<div id="sidebar">
    <h3>Salas</h3>

    <div class="room" onclick="joinRoom('general')"># general</div>
    <div class="room" onclick="joinRoom('gaming')"># gaming</div>
    <div class="room" onclick="joinRoom('dev')"># dev</div>
</div>

<div id="chat">

    <ul id="messages"></ul>

    <div id="inputBox">
        <input id="sender" placeholder="Nombre">
        <input id="message" placeholder="Mensaje">
        <button onclick="sendMessage()">Enviar</button>
    </div>

</div>

<script>

    let stompClient = null;
    let currentRoom = "general";

    function connect() {

        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            subscribeToRoom(currentRoom);
        });
    }

    function joinRoom(room) {

        currentRoom = room;

        document.getElementById("messages").innerHTML = "";

        subscribeToRoom(room);

        loadMessages(room);
    }

    function subscribeToRoom(room) {

        stompClient.subscribe("/topic/room/" + room, function (msg) {
            const message = JSON.parse(msg.body);
            showMessage(message);
        });
    }

    async function loadMessages(room) {

        const response = await fetch("/api/messages/" + room);
        const messages = await response.json();

        messages.forEach(m => showMessage(m));
    }

    function sendMessage() {

        const sender = document.getElementById("sender").value;
        const content = document.getElementById("message").value;

        stompClient.send("/app/chat/" + currentRoom, {}, JSON.stringify({
            sender: sender,
            content: content,
            roomId: currentRoom
        }));
    }

    function showMessage(message) {

        const messages = document.getElementById("messages");

        const li = document.createElement("li");

        li.innerHTML =
            "<strong>" + message.sender + "</strong> " +
            "<span style='color:gray; font-size:12px;'>[" + message.timestamp + "]</span><br>" +
            message.content;

        messages.appendChild(li);

        messages.scrollTop = messages.scrollHeight;
    }

    connect();
    loadMessages(currentRoom);

</script>

</body>
</html>
