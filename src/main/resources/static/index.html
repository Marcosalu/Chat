<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat Rooms</title>

    <link rel="stylesheet" href="style.css">

    <!-- WebSocket libs -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>

<div id="sidebar">

    <h2>Salas</h2>

    <div class="room" onclick="joinRoom('general')"># general</div>
    <div class="room" onclick="joinRoom('gaming')"># gaming</div>
    <div class="room" onclick="joinRoom('dev')"># dev</div>

</div>

<div id="chat">

    <ul id="messages"></ul>

    <div id="inputBox">

        <input type="text" id="sender" placeholder="Nombre">
        <input type="text" id="message" placeholder="Mensaje">

        <button onclick="sendMessage()">Enviar</button>

    </div>

</div>

<script>

    let stompClient = null;
    let currentRoom = "general";
    let currentSubscription = null;

    // 🔌 CONNECT
    function connect() {

        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {

            console.log("✅ WebSocket conectado");

            joinRoom(currentRoom);

        }, function (error) {

            console.error("❌ Error WebSocket:", error);

        });
    }

    // 🚪 JOIN ROOM
    function joinRoom(room) {

        currentRoom = room;

        console.log("➡️ Entrando a sala:", room);

        // cancelar suscripción anterior
        if (currentSubscription) {
            currentSubscription.unsubscribe();
            currentSubscription = null;
        }

        // limpiar UI
        document.getElementById("messages").innerHTML = "";

        // suscribirse a nueva sala
        currentSubscription = stompClient.subscribe(
            "/topic/room/" + room,
            function (msg) {

                try {
                    const message = JSON.parse(msg.body);
                    showMessage(message);
                } catch (e) {
                    console.error("Error parseando mensaje", e);
                }

            }
        );

        // cargar historial
        loadMessages(room);
    }

    // 📥 LOAD HISTORY
    async function loadMessages(room) {

        try {

            const response = await fetch("/api/messages/" + room);

            if (!response.ok) {
                console.error("Error HTTP:", response.status);
                return;
            }

            const messages = await response.json();

            const box = document.getElementById("messages");

            box.innerHTML = "";

            messages.forEach(m => showMessage(m));

        } catch (err) {
            console.error("Error cargando historial:", err);
        }
    }

    // 📤 SEND MESSAGE
    function sendMessage() {

        const sender = document.getElementById("sender").value;
        const content = document.getElementById("message").value;

        if (!stompClient || !stompClient.connected) {
            console.error("WebSocket no conectado");
            return;
        }

        if (!content.trim()) return;

        stompClient.send(
            "/app/chat/" + currentRoom,
            {},
            JSON.stringify({
                sender: sender,
                content: content,
                roomId: currentRoom
            })
        );

        document.getElementById("message").value = "";
    }

    // 💬 SHOW MESSAGE
    function showMessage(message) {

        const box = document.getElementById("messages");

        const li = document.createElement("li");

        li.innerHTML =
            "<strong>" + message.sender + "</strong> " +
            "<span style='color:gray;font-size:12px;'>[" +
            message.timestamp +
            "]</span><br>" +
            message.content;

        box.appendChild(li);

        box.scrollTop = box.scrollHeight;
    }

    // 🚀 START
    connect();

</script>

</body>
</html>
