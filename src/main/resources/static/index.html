<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat Rooms</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>

<div id="sidebar">

    <h2>💬 SALAS</h2>

    <div class="room" onclick="joinRoom('general')"># general</div>
    <div class="room" onclick="joinRoom('gaming')"># gaming</div>
    <div class="room" onclick="joinRoom('dev')"># dev</div>

</div>

<div id="chat">

    <div id="topbar">
        Usuario: <span id="user"></span> |
        Sala: <span id="currentRoom">general</span>
    </div>

    <ul id="messages"></ul>

    <!-- TYPING INDICATOR -->
    <div id="typing"></div>

    <div id="inputBox">

        <input type="text" id="message" placeholder="Escribe un mensaje...">
        <button onclick="sendMessage()">Enviar</button>

    </div>

</div>

<script>

    let stompClient = null;
    let currentRoom = "general";
    let currentSubscription = null;
    let typingSubscription = null;

    const userEmail = localStorage.getItem("userEmail") || "Invitado";
    document.getElementById("user").innerText = userEmail;

    // =========================
    // CONNECT
    // =========================
    function connect() {

        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            joinRoom(currentRoom);
        });
    }

    // =========================
    // JOIN ROOM
    // =========================
    async function joinRoom(room) {

        currentRoom = room;
        document.getElementById("currentRoom").innerText = room;

        if (currentSubscription) currentSubscription.unsubscribe();
        if (typingSubscription) typingSubscription.unsubscribe();

        document.getElementById("messages").innerHTML = "";

        await loadHistory(room);

        // MENSAJES
        currentSubscription = stompClient.subscribe(
            "/topic/" + room,
            function (msg) {
                showMessage(JSON.parse(msg.body));
            }
        );

        // TYPING
        typingSubscription = stompClient.subscribe(
            "/topic/" + room + "/typing",
            function (msg) {
                document.getElementById("typing").innerText = msg.body;
            }
        );
    }

    // =========================
    // HISTORIAL
    // =========================
    async function loadHistory(room) {

        const res = await fetch("/api/messages/" + room);
        const messages = await res.json();

        messages.forEach(showMessage);
    }

    // =========================
    // SEND MESSAGE
    // =========================
    function sendMessage() {

        const input = document.getElementById("message");
        const content = input.value.trim();

        if (!content) return;

        stompClient.send("/app/send", {}, JSON.stringify({
            sender: userEmail,
            content: content,
            roomId: currentRoom
        }));

        input.value = "";
    }

    // =========================
    // SHOW MESSAGE
    // =========================
    function showMessage(message) {

        const box = document.getElementById("messages");

        const li = document.createElement("li");

        li.innerHTML =
            "<strong>" + message.sender + "</strong><br>" +
            message.content;

        box.appendChild(li);

        box.scrollTop = box.scrollHeight;
    }

    // =========================
    // START
    // =========================
    connect();

</script>

</body>
</html>
